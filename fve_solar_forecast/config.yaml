name: "FVE Solar Forecast"
version: "1.0.6"
slug: "fve_solar_forecast"
description: "Predikce výroby solární elektrárny s automatickým učením"
url: "https://github.com/petrflorian/FVE"

arch:
  - amd64
  - aarch64
  - armhf
  - armv7

homeassistant_api: true

ingress: true
ingress_port: 8099
panel_icon: "mdi:solar-power"
panel_title: "Solar Forecast"

map:
  - data

options:
  latitude: 50.0
  longitude: 14.0
  tilt: 30
  azimuth: 180
  kwp: 5.0
  ha_url: "http://supervisor/core"
  ha_sensor_power: "sensor.solar_assistant_pv_power"
  ha_sensor_energy: "sensor.solar_assistant_pv_energy_today"
  ha_sensor_battery_soc: ""
  ha_sensor_battery_power: ""
  ha_sensor_grid_power: ""
  ha_sensor_load_power: ""
  calibration_window_days: 14
  log_level: "info"

schema:
  latitude: "float"
  longitude: "float"
  tilt: "int"
  azimuth: "int"
  kwp: "float"
  ha_token: "str?"
  ha_url: "str"
  ha_sensor_power: "str"
  ha_sensor_energy: "str"
  ha_sensor_battery_soc: "str?"
  ha_sensor_battery_power: "str?"
  ha_sensor_grid_power: "str?"
  ha_sensor_load_power: "str?"
  calibration_window_days: "int(7,90)"
  log_level: "list(debug|info|warning|error)"
