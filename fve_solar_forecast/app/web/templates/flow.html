{% extends "base.html" %}
{% block title %}Toky – FVE Solar Forecast{% endblock %}

{% block content %}
<style>
  /* ── Layout ── */
  .fw { max-width: 960px; margin: 0 auto; padding: 1rem 1rem 2.5rem; }
  .fw-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .fw-header h2 { margin: 0; font-size: 1.15rem; letter-spacing: 0.01em; }
  .fw-ts { font-size: 0.78rem; color: #94a3b8; }

  /* ── SVG canvas ── */
  #fsvg {
    width: 100%;
    height: auto;
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 0 0 1px #ecf0f1;
  }

  /* ── Node boxes ── */
  .nb { stroke-width: 1.5; }
  .nb-solar { fill: #fffbeb; stroke: #d97706; }
  .nb-inv   { fill: #f0f9ff; stroke: #3b82f6; }
  .nb-home  { fill: #eff6ff; stroke: #2563eb; }
  .nb-grid  { fill: #fff5f5; stroke: #ef4444; }
  .nb-bat   { fill: #f0fdf4; stroke: #22c55e; }

  /* ── Node text ── */
  .nt-icon   { font-size: 26px; text-anchor: middle; dominant-baseline: middle; }
  .nt-label  { font-size: 10px; fill: #94a3b8; text-anchor: middle; letter-spacing: 1.2px; font-weight: 600; }
  .nt-val    { font-size: 18px; font-weight: 700; text-anchor: middle; }
  .nt-kwh    { font-size: 11px; fill: #94a3b8; text-anchor: middle; }
  .nt-dir    { font-size: 10px; text-anchor: middle; font-weight: 600; letter-spacing: 0.5px; }
  .nt-inv-st { font-size: 11px; text-anchor: middle; }

  .c-solar  { fill: #d97706; }
  .c-home   { fill: #2563eb; }
  .c-import { fill: #dc2626; }
  .c-charge { fill: #16a34a; }
  .c-dis    { fill: #ea580c; }
  .c-idle   { fill: #cbd5e1; }

  /* ── Flow lines ── */
  .track { fill: none; stroke: #e2e8f0; stroke-width: 2.5; }
  .fline { fill: none; stroke-linecap: round; stroke-dasharray: 9 26; }

  @keyframes ff { from { stroke-dashoffset: 35; } to { stroke-dashoffset: 0; } }
  @keyframes fr { from { stroke-dashoffset: 0;  } to { stroke-dashoffset: 35; } }

  /* ── SOC bar ── */
  .soc-bg   { fill: #e2e8f0; }
  .soc-good { fill: #22c55e; }
  .soc-mid  { fill: #f59e0b; }
  .soc-low  { fill: #ef4444; }

  /* ── Line value labels ── */
  .lv-bg { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
  .lv    { font-size: 11px; fill: #475569; text-anchor: middle; font-weight: 600; }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    margin-top: 0.85rem;
  }
  .stat-pill {
    display: flex;
    align-items: center;
    gap: 0.45rem;
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 9999px;
    padding: 0.35rem 0.85rem;
    font-size: 0.82rem;
    color: #374151;
    transition: border-color 0.3s;
  }
  .stat-pill .sp-icon { font-size: 1rem; }
  .stat-pill .sp-val  { font-weight: 700; }
  .sp-suff  .sp-val { color: #16a34a; }
  .sp-solar .sp-val { color: #d97706; }
  .sp-grid-imp .sp-val { color: #dc2626; }

  /* ── Legend ── */
  .flow-legend {
    display: flex; flex-wrap: wrap; gap: 0.5rem 1.2rem;
    margin-top: 0.85rem; font-size: 0.75rem; color: #94a3b8;
  }
  .leg { display: flex; align-items: center; gap: 0.35rem; }
  .leg-dot { width: 16px; height: 3px; border-radius: 2px; }
</style>

<div class="fw">
  <div class="fw-header">
    <h2>⚡ Energetické toky</h2>
    <span class="fw-ts" id="fw-ts">načítám…</span>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!--  SVG layout (900×505):                                             -->
  <!--    Solar (top-center)                                              -->
  <!--    Grid (left) ── Inverter (center) ── Home (right)                -->
  <!--    Battery (bottom-center)                                         -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <svg id="fsvg" viewBox="0 0 900 505" xmlns="http://www.w3.org/2000/svg">

    <!-- ── DEFS ── -->
    <defs>
      <!-- Background dot pattern -->
      <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
        <circle cx="1" cy="1" r="0.8" fill="#cbd5e1" opacity="0.6"/>
      </pattern>

      <!-- ── Icon symbols (stroke-based, 24×24) ── -->
      <symbol id="ico-solar" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-linecap="round" stroke-linejoin="round">
        <!-- Panel frame -->
        <rect x="2" y="3" width="20" height="12" rx="2" stroke-width="1.7"/>
        <!-- Cell dividers -->
        <line x1="9"  y1="3" x2="9"  y2="15" stroke-width="1.1"/>
        <line x1="15" y1="3" x2="15" y2="15" stroke-width="1.1"/>
        <line x1="2"  y1="9" x2="22" y2="9"  stroke-width="1.1"/>
        <!-- Mounting legs -->
        <line x1="8"  y1="15" x2="6"  y2="21" stroke-width="1.7"/>
        <line x1="16" y1="15" x2="18" y2="21" stroke-width="1.7"/>
        <line x1="6"  y1="21" x2="18" y2="21" stroke-width="1.7"/>
      </symbol>

      <symbol id="ico-bolt" viewBox="0 0 24 24">
        <!-- Solid lightning bolt (filled) -->
        <path d="M13 2L4 14h8L10 22L21 10h-8z" fill="currentColor"/>
      </symbol>

      <symbol id="ico-home" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12L12 3l9 9" stroke-width="1.7"/>
        <path d="M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9" stroke-width="1.7"/>
      </symbol>

      <symbol id="ico-plug" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-linecap="round" stroke-linejoin="round">
        <!-- Prongs -->
        <path d="M9 3v5M15 3v5" stroke-width="1.8"/>
        <!-- Body -->
        <path d="M6 8h12v3a5 5 0 01-5 5h-2a5 5 0 01-5-5V8z" stroke-width="1.7"/>
        <!-- Cable -->
        <line x1="12" y1="16" x2="12" y2="21" stroke-width="1.8"/>
      </symbol>
    </defs>

    <!-- Subtle background grid -->
    <rect width="900" height="505" fill="url(#dots)" rx="16"/>

    <!-- ═══════════════ TRACK LINES (always visible, dark) ═══════════════ -->
    <line class="track" x1="450" y1="122" x2="450" y2="198"/>   <!-- solar↕inv   -->
    <line class="track" x1="532" y1="250" x2="698" y2="250"/>   <!-- inv→home    -->
    <line class="track" x1="202" y1="250" x2="368" y2="250"/>   <!-- grid→inv    -->
    <line class="track" x1="450" y1="302" x2="450" y2="368"/>   <!-- inv↕bat     -->

    <!-- ═══════════════ ENERGY FLOW LINES (animated, colored) ═══════════ -->
    <line id="fl-solar" class="fline" x1="450" y1="122" x2="450" y2="198"/>
    <line id="fl-home"  class="fline" x1="532" y1="250" x2="698" y2="250"/>
    <line id="fl-grid"  class="fline" x1="202" y1="250" x2="368" y2="250"/>
    <line id="fl-bat"   class="fline" x1="450" y1="302" x2="450" y2="368"/>

    <!-- ═══════════════ LINE VALUE LABELS ═══════════════ -->
    <!-- Solar↕Inv – right of vertical line -->
    <rect id="lvbg-solar" class="lv-bg" x="460" y="151" width="52" height="16" rx="4" display="none"/>
    <text id="lv-solar" class="lv" x="486" y="163"></text>

    <!-- Inv→Home – above horizontal line -->
    <rect id="lvbg-home" class="lv-bg" x="589" y="233" width="52" height="16" rx="4" display="none"/>
    <text id="lv-home" class="lv" x="615" y="245"></text>

    <!-- Grid→Inv – above horizontal line -->
    <rect id="lvbg-grid" class="lv-bg" x="259" y="233" width="52" height="16" rx="4" display="none"/>
    <text id="lv-grid" class="lv" x="285" y="245"></text>

    <!-- Inv↕Bat – right of vertical line -->
    <rect id="lvbg-bat" class="lv-bg" x="460" y="326" width="52" height="16" rx="4" display="none"/>
    <text id="lv-bat" class="lv" x="486" y="338"></text>

    <!-- ═══════════════ NODE: SOLAR (top) ═══════════════ -->
    <rect id="box-solar" class="nb nb-solar" x="370" y="15" width="160" height="107" rx="14"/>
    <!-- Solar panel icon -->
    <g id="solar-icon-g" style="color:#d97706">
      <use href="#ico-solar" x="432" y="24" width="36" height="36"/>
    </g>
    <text class="nt-label" x="450" y="72">SOLÁR (FV)</text>
    <text id="v-solar" class="nt-val c-solar" x="450" y="95">–</text>
    <text id="k-solar" class="nt-kwh" x="450" y="112">–</text>

    <!-- ═══════════════ NODE: INVERTER (center) ═══════════════ -->
    <rect class="nb nb-inv" x="368" y="198" width="164" height="104" rx="14"/>
    <!-- Inverter bolt icon -->
    <g style="color:#3b82f6">
      <use href="#ico-bolt" x="436" y="210" width="28" height="28"/>
    </g>
    <text class="nt-label" x="450" y="272">STŘÍDAČ</text>
    <text id="v-inv" class="nt-inv-st c-idle" x="450" y="291">–</text>

    <!-- ═══════════════ NODE: HOME (right) ═══════════════ -->
    <rect id="box-home" class="nb nb-home" x="700" y="198" width="160" height="104" rx="14"/>
    <!-- Home icon -->
    <g style="color:#2563eb">
      <use href="#ico-home" x="762" y="208" width="36" height="36"/>
    </g>
    <text class="nt-label" x="780" y="272">SPOTŘEBA</text>
    <text id="v-home" class="nt-val c-home" x="780" y="291">–</text>

    <!-- ═══════════════ NODE: GRID (left) ═══════════════ -->
    <rect id="box-grid" class="nb nb-grid" x="40" y="198" width="160" height="104" rx="14"/>
    <!-- Grid plug icon -->
    <g style="color:#ef4444">
      <use href="#ico-plug" x="106" y="208" width="28" height="28"/>
    </g>
    <text class="nt-label" x="120" y="272">SÍŤ</text>
    <text id="v-grid"   class="nt-val c-idle" x="120" y="294">–</text>

    <!-- ═══════════════ NODE: BATTERY (bottom) ═══════════════ -->
    <rect id="box-bat" class="nb nb-bat" x="370" y="368" width="160" height="122" rx="14"/>
    <!-- Battery icon (outline with fill indicating SOC) -->
    <rect x="427" y="378" width="46" height="24" rx="4" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.7"/>
    <rect x="473" y="384" width="5" height="12" rx="2" fill="#22c55e" opacity="0.5"/>
    <rect id="bat-icon-fill" x="429" y="380" width="0" height="20" rx="3" fill="#22c55e" opacity="0.7"/>
    <text class="nt-label" x="450" y="414">BATERIE</text>
    <text id="v-bat" class="nt-val c-idle" x="450" y="435">–</text>
    <!-- SOC progress bar -->
    <rect class="soc-bg" x="393" y="445" width="114" height="8" rx="4"/>
    <rect id="soc-fill" x="393" y="445" width="0" height="8" rx="4" class="soc-good"/>
    <text id="v-soc" class="nt-kwh" x="450" y="468">SOC: –</text>
    <text id="v-bat-v" class="nt-kwh" x="450" y="482"></text>

    <!-- ═══════════════ CORNER DIRECTION ARROWS ═══════════════ -->
    <!-- These simple triangles hint at the active flow direction -->
    <!-- Solar (always down) -->
    <polygon id="arr-solar" points="450,132 444,124 456,124" fill="#f59e0b" opacity="0" />
    <!-- Home (always right) -->
    <polygon id="arr-home" points="688,250 680,244 680,256" fill="#2563eb" opacity="0"/>
    <!-- Grid import (right = toward inv) / export (left = toward grid) -->
    <polygon id="arr-grid" points="358,250 366,244 366,256" fill="#dc2626" opacity="0"/>
    <!-- Battery charge (down) / discharge (up) -->
    <polygon id="arr-bat" points="450,358 444,350 456,350" fill="#22c55e" opacity="0"/>

  </svg>

  <!-- ═══════════════ STATS BAR ═══════════════ -->
  <div class="stats-bar">
    <div class="stat-pill sp-suff" id="pill-suff" style="display:none">
      <span class="sp-icon">🌿</span>
      <span>Soběstačnost</span>
      <span class="sp-val" id="sp-suff-val">–</span>
    </div>
    <div class="stat-pill sp-solar" id="pill-kwh" style="display:none">
      <span class="sp-icon">☀️</span>
      <span>Dnes</span>
      <span class="sp-val" id="sp-kwh-val">–</span>
    </div>
    <div class="stat-pill sp-grid-imp" id="pill-grid-imp" style="display:none">
      <span class="sp-icon">🔴</span>
      <span>Import ze sítě</span>
      <span class="sp-val" id="sp-grid-imp-val">–</span>
    </div>
    <div class="stat-pill" style="margin-left:auto;color:#94a3b8;font-size:0.72rem">
      ↻ 2 s
    </div>
  </div>

  <!-- ═══════════════ LEGEND ═══════════════ -->
  <div class="flow-legend">
    <span class="leg"><span class="leg-dot" style="background:#d97706"></span> Výroba FV</span>
    <span class="leg"><span class="leg-dot" style="background:#2563eb"></span> Spotřeba domu</span>
    <span class="leg"><span class="leg-dot" style="background:#16a34a"></span> Nabíjení baterie</span>
    <span class="leg"><span class="leg-dot" style="background:#ea580c"></span> Vybíjení</span>
    <span class="leg"><span class="leg-dot" style="background:#dc2626"></span> Import ze sítě</span>
    <span class="leg" style="color:#1f2937">— tloušťka = výkon</span>
  </div>
</div>

<script>
(function () {
  const BASE = "{{ base }}";
  const MAX_W = 8000;

  /* ── Formatting ── */
  function fmtW(v) {
    if (v === null || v === undefined) return "–";
    const a = Math.abs(v);
    return a >= 1000 ? (a / 1000).toFixed(2) + " kW" : Math.round(a) + " W";
  }
  function fmtKwh(v) {
    if (v === null || v === undefined) return null;
    return v.toFixed(1) + " kWh";
  }

  /* ── Flow line helpers ── */
  function strokeW(watts) {
    const n = Math.min(Math.abs(watts) / MAX_W, 1);
    return (3 + n * 9).toFixed(1);
  }
  function flowSpeed(watts) {
    const n = Math.min(Math.abs(watts) / MAX_W, 1);
    return Math.max(0.28, 1.4 - n * 1.1).toFixed(2) + "s";
  }

  /**
   * Update a single flow line.
   * lineId  – SVG line element id
   * lvBgId  – label background rect id
   * lvId    – label text id
   * arrId   – direction arrow polygon id
   * watts   – power (null = not configured, 0 = idle)
   * color   – CSS hex color string when active
   * fwd     – true = animate start→end, false = end→start
   * arrPts  – polygon points for arrow when active
   */
  function setLine(lineId, lvBgId, lvId, arrId, watts, color, fwd) {
    const line = document.getElementById(lineId);
    const lv   = document.getElementById(lvId);
    const lvbg = document.getElementById(lvBgId);
    const arr  = document.getElementById(arrId);

    const active = watts !== null && Math.abs(watts) >= 5;

    if (!active) {
      line.style.stroke = "transparent";
      line.style.animation = "none";
      lv.textContent = "";
      lvbg.setAttribute("display", "none");
      if (arr) arr.setAttribute("opacity", "0");
      return;
    }

    const sw = strokeW(watts);
    const sp = flowSpeed(watts);
    line.style.stroke        = color;
    line.style.strokeWidth   = sw;
    line.style.animation     = `${fwd ? "ff" : "fr"} ${sp} linear infinite`;

    const txt = fmtW(watts);
    lv.textContent = txt;
    lv.setAttribute("fill", color);
    lvbg.setAttribute("display", "block");

    if (arr) {
      arr.setAttribute("fill", color);
      arr.setAttribute("opacity", "0.9");
    }
  }

  /* ── Glow effect on node box ── */
  function setGlow(boxId, color, intensity) {
    const box = document.getElementById(boxId);
    if (!box) return;
    if (intensity > 0) {
      const r = intensity * 14;
      box.style.filter = `drop-shadow(0 0 ${r}px ${color})`;
    } else {
      box.style.filter = "none";
    }
  }

  async function refresh() {
    let d;
    try {
      const r = await fetch(BASE + "/api/flow");
      if (!r.ok) return;
      d = await r.json();
    } catch { return; }

    /* ── Solar ── */
    document.getElementById("v-solar").textContent = fmtW(d.pv_w);
    const kwh = fmtKwh(d.pv_kwh_today);
    document.getElementById("k-solar").textContent = kwh ? kwh + " dnes" : "";
    setLine("fl-solar", "lvbg-solar", "lv-solar", "arr-solar",
            d.pv_w, "#d97706", true);
    const pvNorm = d.pv_w ? Math.min(d.pv_w / MAX_W, 1) : 0;
    setGlow("box-solar", "rgba(217,119,6,0.35)", pvNorm);

    /* Dim solar icon when inactive */
    const solarIcon = document.getElementById("solar-icon-g");
    if (d.pv_w && d.pv_w > 10) {
      solarIcon.style.opacity = "1";
    } else {
      solarIcon.style.opacity = "0.35";
    }

    /* ── Home / Load ── */
    document.getElementById("v-home").textContent = fmtW(d.load_w);
    setLine("fl-home", "lvbg-home", "lv-home", "arr-home",
            d.load_w, "#2563eb", true);
    const loadNorm = d.load_w ? Math.min(d.load_w / MAX_W, 1) : 0;
    setGlow("box-home", "rgba(37,99,235,0.25)", loadNorm);

    /* ── Grid ── */
    const gw = d.grid_w;
    const vGrid   = document.getElementById("v-grid");
    const arrGrid = document.getElementById("arr-grid");

    if (gw !== null && gw >= 5) {
      vGrid.textContent = fmtW(gw);
      vGrid.setAttribute("class", "nt-val c-import");
      setLine("fl-grid", "lvbg-grid", "lv-grid", null, gw, "#dc2626", true);
      if (arrGrid) {
        arrGrid.setAttribute("fill", "#dc2626");
        arrGrid.setAttribute("opacity", "0.9");
        arrGrid.setAttribute("points", "358,250 366,244 366,256");
      }
      setGlow("box-grid", "rgba(220,38,38,0.2)", Math.min(gw / MAX_W, 1));
      document.getElementById("pill-grid-imp").style.display = "flex";
      document.getElementById("sp-grid-imp-val").textContent = fmtW(gw);
    } else {
      vGrid.textContent = gw !== null ? "0 W" : "N/A";
      vGrid.setAttribute("class", "nt-val c-idle");
      setLine("fl-grid", "lvbg-grid", "lv-grid", arrGrid, 0, "#374151", true);
      setGlow("box-grid", "", 0);
      document.getElementById("pill-grid-imp").style.display = "none";
    }

    /* ── Battery ── */
    const bw  = d.battery_w;
    const soc = d.battery_soc_pct;
    const vBat = document.getElementById("v-bat");
    const arrBat = document.getElementById("arr-bat");

    if (bw !== null && Math.abs(bw) >= 5) {
      const chg = bw > 0;
      const col = chg ? "#16a34a" : "#ea580c";
      vBat.textContent = fmtW(bw);
      vBat.setAttribute("class", `nt-val ${chg ? "c-charge" : "c-dis"}`);
      /* path Inv→Bat: fwd = charge (inv→bat), rev = discharge (bat→inv) */
      setLine("fl-bat", "lvbg-bat", "lv-bat", null, bw, col, chg);
      if (arrBat) {
        arrBat.setAttribute("fill", col);
        arrBat.setAttribute("opacity", "0.9");
        if (chg) {
          arrBat.setAttribute("points", "450,358 444,350 456,350"); /* pointing down = toward bat */
        } else {
          arrBat.setAttribute("points", "450,312 444,320 456,320"); /* pointing up = toward inv */
        }
      }
      setGlow("box-bat", chg ? "rgba(22,163,74,0.2)" : "rgba(234,88,12,0.18)",
              Math.min(Math.abs(bw) / MAX_W, 1));
    } else {
      vBat.textContent = bw !== null ? "0 W" : "N/A";
      vBat.setAttribute("class", "nt-val c-idle");
      setLine("fl-bat", "lvbg-bat", "lv-bat", arrBat, 0, "#374151", true);
      setGlow("box-bat", "", 0);
    }

    /* SOC bar & icon fill */
    if (soc !== null && soc !== undefined) {
      document.getElementById("v-soc").textContent = "SOC " + Math.round(soc) + "%";
      const barW = Math.round(soc * 1.14); /* 114px = 100% */
      const fill = document.getElementById("soc-fill");
      fill.setAttribute("width", barW);
      fill.setAttribute("class", soc < 20 ? "soc-low" : soc < 50 ? "soc-mid" : "soc-good");
      /* Battery icon fill */
      const iconFill = document.getElementById("bat-icon-fill");
      iconFill.setAttribute("width", Math.round(soc * 0.42)); /* max 42px ≈ 100% */
      iconFill.setAttribute("fill", soc < 20 ? "#ef4444" : soc < 50 ? "#f59e0b" : "#22c55e");
    } else {
      document.getElementById("v-soc").textContent = "SOC: N/A";
      document.getElementById("soc-fill").setAttribute("width", 0);
      document.getElementById("bat-icon-fill").setAttribute("width", 0);
    }

    /* Battery voltage */
    const vBatV = document.getElementById("v-bat-v");
    if (d.battery_voltage_v !== null && d.battery_voltage_v !== undefined) {
      vBatV.textContent = d.battery_voltage_v.toFixed(1) + " V";
    } else {
      vBatV.textContent = "";
    }

    /* ── Inverter status ── */
    const vInv = document.getElementById("v-inv");
    if (d.inverter_mode) {
      vInv.textContent = d.inverter_mode;
      const active = ["Line", "Battery", "Solar", "Hybrid"].includes(d.inverter_mode);
      vInv.setAttribute("class", `nt-inv-st ${active ? "c-charge" : "c-idle"}`);
    } else if (d.pv_w && d.pv_w >= 10) {
      vInv.textContent = "● aktivní";
      vInv.setAttribute("class", "nt-inv-st c-charge");
    } else {
      vInv.textContent = "○ standby";
      vInv.setAttribute("class", "nt-inv-st c-idle");
    }

    /* ── Self-sufficiency pill ── */
    const suff = d.self_sufficiency_pct;
    const pillSuff = document.getElementById("pill-suff");
    if (suff !== null && suff !== undefined) {
      pillSuff.style.display = "flex";
      document.getElementById("sp-suff-val").textContent = Math.round(suff) + " %";
      const sv = document.querySelector("#pill-suff .sp-val");
      sv.style.color = suff >= 80 ? "#16a34a" : suff >= 50 ? "#d97706" : "#dc2626";
    } else {
      pillSuff.style.display = "none";
    }

    /* ── Solar kWh pill ── */
    const pillKwh = document.getElementById("pill-kwh");
    if (d.pv_kwh_today !== null && d.pv_kwh_today !== undefined) {
      pillKwh.style.display = "flex";
      document.getElementById("sp-kwh-val").textContent = d.pv_kwh_today.toFixed(1) + " kWh";
    } else {
      pillKwh.style.display = "none";
    }

    /* ── Timestamp ── */
    document.getElementById("fw-ts").textContent =
      d.updated_at ? "Aktualizováno: " + d.updated_at : "";
  }

  refresh();
  setInterval(refresh, 2000);
})();
</script>
{% endblock %}
