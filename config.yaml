name: "FVE Solar Forecast"
version: "1.0.0"
slug: "fve_solar_forecast"
description: "Predikce výroby solární elektrárny s automatickým učením"
url: "https://github.com/petrflorian/FVE"

arch:
  - amd64
  - aarch64
  - armhf
  - armv7

# HA Supervisor integration – injektuje SUPERVISOR_TOKEN a zpřístupní HA Core API
homeassistant_api: true

# Ingress – přístup přes HA sidebar bez nutnosti otevírat porty
ingress: true
ingress_port: 8099
panel_icon: "mdi:solar-power"
panel_title: "Solar Forecast"

# Perzistentní úložiště pro SQLite DB
map:
  - type: data

options:
  latitude: 50.0
  longitude: 14.0
  tilt: 30
  azimuth: 180
  kwp: 5.0
  ha_token: ""
  ha_url: "http://supervisor/core"
  ha_sensor_power: "sensor.solar_assistant_pv_power"
  ha_sensor_energy: "sensor.solar_assistant_pv_energy_today"
  calibration_window_days: 14
  log_level: "info"

schema:
  latitude: "float(-90,90)"
  longitude: "float(-180,180)"
  tilt: "int(0,90)"
  azimuth: "int(0,360)"
  kwp: float
  ha_token: "str?"
  ha_url: str
  ha_sensor_power: str
  ha_sensor_energy: str
  calibration_window_days: "int(7,90)"
  log_level: "list(debug|info|warning|error)"
